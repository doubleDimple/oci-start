name: OciStart
options:
  bundleIdPrefix: com.doubledimple
  deploymentTarget:
    # Product support floor: macOS Big Sur 11.7.11+
    macOS: "11.0"
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4

targets:
  OciStart:
    type: application
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: OciStart
        createIntermediateGroups: true
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.doubledimple.ocistart
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.5"
        MACOSX_DEPLOYMENT_TARGET: "11.0"
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: OciStart
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    info:
      path: OciStart/Info.plist
      properties:
        CFBundleName: OciStart
        CFBundleDisplayName: OCI Start
        CFBundleIdentifier: com.doubledimple.ocistart
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "11.0"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSUIElement: false
    entitlements:
      path: OciStart/OciStart.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.keychain-access-groups:
          - $(AppIdentifierPrefix)com.doubledimple.ocistart
