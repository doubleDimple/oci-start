# 本地调试：强制禁用 Turnstile 人机验证（生产环境请勿开启）
turnstile:
  local:
    bypass: true

spring:
  cache:
    type: caffeine
    caffeine:
      # 覆盖common模块中的默认配置
      spec: initialCapacity=100,maximumSize=1000,expireAfterAccess=30m,expireAfterWrite=1h
  quartz:
    web:
      enabled: true
      base-path: /quartz-monitor
      path: /quartz-ui
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
  main:
    lazy-initialization: true
  jmx:
    enabled: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  application:
    name: oci-server-pro
  freemarker:
    template-loader-path: classpath:/templates/
    content-type: text/html
    cache: true
    charset: UTF-8
    check-template-location: true
    expose-request-attributes: false
    expose-session-attributes: false
    request-context-attribute: req
    suffix: .ftl
    settings:
      api_builtin_enabled: true
      date_format: yyyy-MM-dd
      time_format: HH:mm:ss
      datetime_format: yyyy-MM-dd HH:mm:ss
  datasource:
    driverClassName: org.h2.Driver
    ##数据库的用户名和密码,目前只支持h2
    url: jdbc:h2:file:/Users/admin/devData/vps_db;DB_CLOSE_ON_EXIT=FALSE
    username: oci-start-sa_admin
    password: QWWQE^$%#^20240190ghf
  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  h2:
    console:
      enabled: false
server:
  max-http-header-size: 81920
  port: 9856

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    com.doubledimple.ociserver: INFO
    com.oracle.bmc.core.VirtualNetworkClient: ERROR
    com.oracle.bmc.http.client.jersey.JerseyHttpClientBuilder: WARN
    com.oracle.bmc.core.BlockstorageClient: ERROR
    com.oracle.bmc.core.ComputeClient: ERROR
    com.oracle.bmc.workrequests.WorkRequestClient: WARN
    com.oracle.bmc.Region: WARN
    com.oracle.bmc.identity.IdentityClient: ERROR
    com.oracle.bmc.objectstorage.ObjectStorageClient: ERROR
    com.oracle.bmc.Services: ERROR
    com.oracle.bmc.ClientRuntime: ERROR
    com.oracle.bmc.logging.LoggingManagementClient: ERROR
    com.oracle.bmc.http.client.jersey.internal.IdleConnectionMonitor: ERROR
    org.springframework.scheduling.quartz.SchedulerFactoryBean: ERROR
    org.quartz.core.QuartzScheduler: ERROR
    org.quartz.impl.StdSchedulerFactory: ERROR
    org.quartz.impl.jdbcjobstore.JobStoreTX: ERROR
baseFile:
  filePath: /Users/admin/devData/upload

rsa:
  privateKey: 

thirdApi:
  domain: https://notify.objboy.com/server-support-api/
  #domain: http://localhost:9966/server-support-api/
  regionNotify: notify
  helpNotify: help
  records: archRecords

oci:
  version: 5.1.8